name: flavor_cli
description: A production-grade CLI tool for automating Flutter flavor configuration, Firebase environment management, and boilerplate generation for scalable apps.
version: 0.0.8
repository: https://github.com/Moo-Meshrif/flavor_cli
homepage: https://github.com/Moo-Meshrif/flavor_cli
issue_tracker: https://github.com/Moo-Meshrif/flavor_cli/issues
platforms:
  android:
  ios:

environment:
  sdk: ">=3.0.0 <4.0.0"

false_secrets:
  - /example/android/app/google-services.json
  - /example/ios/Runner/GoogleService-Info.plist
  - /example/lib/firebase_options_dev.dart
  - /example/lib/firebase_options_prod.dart
  - /example/lib/firebase_options_stage.dart

dependencies:
  args: ^2.7.0
  mason_logger: ^0.3.5
  path: ^1.9.1
  yaml: ^3.1.3
  yaml_edit: ^2.2.4

executables:
  flavor_cli:

dev_dependencies:
  test: ^1.24.0